<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            align-items: center;
            margin-top: -50px; 
        }

        .logo-animado {
            width: 180px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)) 
                    drop-shadow(0 0 10px rgba(255, 255, 255, 1));
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* Botones sin ningún elemento extra */
        .btn {
            display: block;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 240px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-jugar { background-color: #2ecc71; }
        .btn-promo { background-color: #3498db; }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 25px;
            text-align: center;
        }

        .whatsapp-link {
            color: #25D366;
            font-size: 35px;
            text-decoration: none;
            transition: transform 0.2s;
            display: block;
            margin-bottom: 5px;
        }

        .footer p {
            color: white;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div id="menu-principal" class="menu-container">
        <img src="logo.png" alt="Logo" class="logo-animado">
        
        <button class="btn btn-jugar" id="btn-jugar">ˇA JUGAR!</button>
        
        <button class="btn btn-promo" id="btn-promo">PROMOCIONES</button>
    </div>

    <div class="footer">
        <a href="https://wa.me/541149496902" target="_blank" class="whatsapp-link">
            <i class="fab fa-whatsapp"></i>
        </a>
        <p>multimedia design</p>
    </div>

</body>
</html>
