<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Cambiado para permitir footer */
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Contenedor principal ajustado */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            align-items: center;
            margin-top: -100px; /* Logo un poco más abajo que antes */
        }

        .logo-animado {
            width: 180px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)) 
                    drop-shadow(0 0 10px rgba(255, 255, 255, 1));
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .btn {
            display: block;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 240px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-jugar { background-color: #2ecc71; }
        .btn-promo { background-color: #3498db; }

        /* Estilos del pie de página */
        .footer {
            position: absolute;
            bottom: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }

        .whatsapp-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }

        .whatsapp-icon:hover { transform: scale(1.1); }

        .footer p {
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="menu-principal" class="menu-container">
        <img src="logo.png" alt="Logo" class="logo-animado">
        
        <button class="btn btn-jugar" id="btn-jugar">ˇA JUGAR!</button>
        <button class="btn btn-promo" id="btn-promo">PROMOCIONES</button>
    </div>

    <div class="footer">
        <a href="https://wa.me/541149496902" target="_blank">
            <img src="whatsapp.png" alt="WhatsApp" class="whatsapp-icon">
        </a>
        <p>multimedia design</p>
    </div>

</body>
</html>
