<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App Completa</title>
    <style>
        /* Reset b·sico para evitar m·rgenes raros */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo de pantalla completa */
        body {
            /* RECUERDA: Debes tener tu archivo back.jpg en la misma carpeta o cambiar la ruta */
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center; /* Centra horizontalmente */
            align-items: center;    /* Centra verticalmente */
            font-family: Arial, sans-serif; /* TipografÌa limpia */
        }

        /* Contenedor principal del men˙ (Logo + Botones) */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espacio entre el logo y los botones */
            text-align: center;
            align-items: center; /* Asegura que el logo estÈ bien centrado */
        }

        /* --- ESTILOS DEL LOGO Y ANIMACI”N --- */
        .logo-animado {
            width: 180px;         /* Ajust· el ancho m·ximo que prefieras para tu logo */
            height: auto;         /* Mantiene la proporciÛn de la imagen */
            margin-bottom: 10px;  /* Margen de separaciÛn con el primer botÛn */
            display: block;
            
            /* Aplicamos la animaciÛn: nombre, duraciÛn (3 segundos), suavizado e infinita */
            animation: flotar 3s ease-in-out infinite;
        }

        /* DefiniciÛn del movimiento del Logo (Efecto flotar) */
        @keyframes flotar {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px); /* Sube 12 pÌxeles a la mitad del ciclo */
            }
            100% {
                transform: translateY(0px); /* Vuelve a la posiciÛn original */
            }
        }

        /* --- Estilo de los BOTONES: M·s CHICOS y REDONDEADOS --- */
        .btn {
            display: inline-block;
            padding: 10px 25px; /* Menos relleno para que sea m·s pequeÒo */
            font-size: 1.1rem;   /* TamaÒo de letra moderado */
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff; /* Texto blanco */
            border-radius: 8px; /* Un redondeado suave y limpio */
            border: none; /* Sin borde */
            cursor: pointer;
            width: 100%; /* Hace que los botones tengan el mismo ancho */
            max-width: 220px; /* Limita el ancho m·ximo del botÛn */
            
            /* Sombra suave para dar volumen sobre el fondo */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease; /* AnimaciÛn suave al pasar el mouse */
            text-decoration: none;
        }

        /* --- Colores de los botones --- */
        .btn-jugar {
            background-color: #2ecc71; /* Verde claro */
        }

        .btn-promo {
            background-color: #3498db; /* Azul claro */
        }

        /* --- Efectos al pasar el mouse (Hover) --- */
        .btn:hover {
            transform: translateY(-2px); /* PequeÒa elevaciÛn */
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4); /* Sombra m·s fuerte */
        }
        
        .btn-jugar:hover {
            background-color: #27ae60; /* Verde m·s oscuro */
        }

        .btn-promo:hover {
            background-color: #2980b9; /* Azul m·s oscuro */
        }

        /* Estilo base para las pantallas ocultas */
        .pantalla {
            display: none;
            text-align: center;
            color: white;
            background-color: rgba(0, 0, 0, 0.7); /* Fondo oscuro semitransparente */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .btn-volver {
            margin-top: 20px;
            background-color: #e74c3c; /* BotÛn rojo para volver */
        }
        .btn-volver:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div id="menu-principal" class="menu-container">
        <img src="logo.png" alt="Logo de la App" class="logo-animado">
        
        <button class="btn btn-jugar" id="btn-jugar">°A Jugar!</button>
        <button class="btn btn-promo" id="btn-promo">Promociones</button>
    </div>

    <div id="pantalla-juego" class="pantalla">
        <h2>SecciÛn de Juego</h2>
        <p>°Ac· va a ir toda la lÛgica de tu juego!</p>
        <button class="btn btn-volver" onclick="volverAlMenu()">Volver al Men˙</button>
    </div>

    <div id="pantalla-promos" class="pantalla">
        <h2>Nuestras Promociones</h2>
        <p>Disfrut· de los mejores beneficios ac·.</p>
        <button class="btn btn-volver" onclick="volverAlMenu()">Volver al Men˙</button>
    </div>

    <script>
        // Captura de los elementos interactivos
        const menuPrincipal = document.getElementById("menu-principal");
        const pantallaJuego = document.getElementById("pantalla-juego");
        const pantallaPromos = document.getElementById("pantalla-promos");

        // Evento para el botÛn °A Jugar!
        document.getElementById("btn-jugar").addEventListener("click", () => {
            menuPrincipal.style.display = "none";
            pantallaJuego.style.display = "block";
        });

        // Evento para el botÛn Promociones
        document.getElementById("btn-promo").addEventListener("click", () => {
            menuPrincipal.style.display = "none";
            pantallaPromos.style.display = "block";
        });

        // FunciÛn global para regresar al men˙ principal
        function volverAlMenu() {
            pantallaJuego.style.display = "none";
            pantallaPromos.style.display = "none";
            menuPrincipal.style.display = "flex";
        }
    </script>
</body>
</html>
