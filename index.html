<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App - Rompecabezas</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 30px; 
            align-items: center;
        }

        /* Contenedor del botón para manejar la sombra, ya que el clip-path corta las sombras normales */
        .puzzle-wrapper {
            filter: drop-shadow(0px 8px 10px rgba(0, 0, 0, 0.4));
            transition: transform 0.2s ease;
        }

        /* Estilo base del botón tipo Rompecabezas */
        .btn-puzzle {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 260px;
            height: 110px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            border: none;
            cursor: pointer;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
            
            /* Esta es la "magia": corta el botón con la forma del SVG que definimos abajo */
            clip-path: url(#puzzle-shape); 
        }

        /* Colores individuales y texturas simuladas */
        .btn-jugar {
            background: linear-gradient(135deg, #ff4e50, #f9d423); /* Degradado brillante */
        }

        .btn-promo {
            background: linear-gradient(135deg, #00c6ff, #0072ff); /* Degradado azul */
        }

        /* Animaciones (Hover y Click) */
        .puzzle-wrapper:hover {
            transform: scale(1.08) rotate(2deg); /* Se agranda y gira un poco al pasar el mouse */
        }

        .puzzle-wrapper:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="menu-container">
        
        <div class="puzzle-wrapper">
            <button class="btn-puzzle btn-jugar" onclick="location.href='#juego'">
                ˇA Jugar!!
            </button>
        </div>
        
        <div class="puzzle-wrapper">
            <button class="btn-puzzle btn-promo" onclick="location.href='#promos'">
                Promociones
            </button>
        </div>

    </div>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <clipPath id="puzzle-shape" clipPathUnits="objectBoundingBox">
                <path d="M 0.15, 0.2 
                         C 0.15, 0.05, 0.35, 0.05, 0.35, 0.2 
                         L 0.65, 0.2 
                         C 0.65, 0.05, 0.85, 0.05, 0.85, 0.2 
                         L 0.85, 0.35 
                         C 1.0, 0.35, 1.0, 0.55, 0.85, 0.55 
                         L 0.85, 0.8 
                         L 0.15, 0.8 
                         L 0.15, 0.55 
                         C 0.0, 0.55, 0.0, 0.35, 0.15, 0.35 
                         Z" />
            </clipPath>
        </defs>
    </svg>

</body>
</html>
