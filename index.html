<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            transition: background-image 0.5s ease;
        }

        /* --- CONTENEDORES --- */
        #menu-principal {
            display: flex; /* Visible por defecto */
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: -50px;
        }

        #pantalla-juego {
            display: none; /* OCULTO POR DEFECTO */
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* --- LOGOS Y BOTONES --- */
        .logo-animado {
            width: 180px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)) drop-shadow(0 0 10px rgba(255, 255, 255, 1));
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .btn {
            display: block;
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 240px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .btn-jugar { background-color: #2ecc71; }
        .btn-promo { background-color: #3498db; }
        .btn-volver { background-color: #e74c3c; }

        .contenedor-logos { display: flex; gap: 40px; }
        .link-juego img { width: 150px; transition: transform 0.3s; }
        .link-juego img:hover { transform: scale(1.1); }

        /* --- FOOTER --- */
        .footer { position: absolute; bottom: 25px; text-align: center; }
        .whatsapp-link { color: #25D366; font-size: 35px; }
        .footer p { color: white; font-size: 0.7rem; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); }
    </style>
</head>
<body>

    <div id="menu-principal">
        <img src="logo.png" alt="Logo" class="logo-animado">
        <button class="btn btn-jugar" id="btn-jugar">A JUGAR</button>
        <button class="btn btn-promo" id="btn-promo">PROMOCIONES</button>
    </div>

    <div id="pantalla-juego">
        <div class="contenedor-logos">
            <a href="https://klalo78.github.io/MEMOMUNDIAL/" target="_blank" class="link-juego">
                <img src="memomundial.png" alt="Memo Mundial">
            </a>
            <a href="https://github.com/klalo78/Trivia-Mundial" target="_blank" class="link-juego">
                <img src="triviamundial.png" alt="Trivia Mundial">
            </a>
        </div>
        <button class="btn btn-volver" onclick="volver()">VOLVER</button>
    </div>

    <div class="footer">
        <a href="https://wa.me/541149496902" target="_blank" class="whatsapp-link"><i class="fab fa-whatsapp"></i></a>
        <p>multimedia design</p>
    </div>

    <script>
        const menu = document.getElementById("menu-principal");
        const juego = document.getElementById("pantalla-juego");

        document.getElementById("btn-jugar").addEventListener("click", () => {
            menu.style.display = "none";
            juego.style.display = "flex";
            document.body.style.backgroundImage = "url('backgames.jpg')";
        });

        function volver() {
            juego.style.display = "none";
            menu.style.display = "flex";
            document.body.style.backgroundImage = "url('back.jpg')";
        }
    </script>
</body>
</html>
