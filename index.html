<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            align-items: center;
            margin-top: -150px; 
        }

        /* Logo con resplandor intenso y doble capa de filtro */
        .logo-animado {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            
            /* Resplandor doble para mayor intensidad */
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)) 
                    drop-shadow(0 0 10px rgba(255, 255, 255, 1));
            
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .btn {
            display: block;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 240px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-jugar { background-color: #2ecc71; }
        .btn-promo { background-color: #3498db; }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4);
        }
        
        .btn-jugar:hover { background-color: #27ae60; }
        .btn-promo:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div id="menu-principal" class="menu-container">
        <img src="logo.png" alt="Logo de la App" class="logo-animado">
        
        <button class="btn btn-jugar" id="btn-jugar">ˇA Jugar!</button>
        <button class="btn btn-promo" id="btn-promo">Promociones</button>
    </div>

</body>
</html>
