<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App Simple</title>
    <style>
        /* Reset b·sico para evitar m·rgenes raros */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fondo de pantalla completa */
        body {
            /* RECUERDA: Debes tener tu archivo back.jpg en la misma carpeta */
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center; /* Centra horizontalmente */
            align-items: center;    /* Centra verticalmente */
            font-family: Arial, sans-serif; /* TipografÌa limpia */
        }

        /* Contenedor principal de los botones */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Menos espacio entre los botones */
            text-align: center;
        }

        /* --- Estilo de los BOTONES: M·s CHICOS y REDONDEADOS --- */
        .btn {
            display: inline-block;
            /* Estos son los valores que controlan el tamaÒo "m·s chico" */
            padding: 10px 25px; /* Menos relleno (padding) para que sea m·s pequeÒo */
            font-size: 1.1rem;   /* TamaÒo de letra m·s moderado */
            
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff; /* Texto blanco */
            
            /* --- El redondeado que pediste --- */
            border-radius: 8px; /* Un redondeado suave y limpio */
            
            border: none; /* Sin borde */
            cursor: pointer;
            
            /* Sombra suave para que no se vea "plano" sobre el fondo */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            
            transition: all 0.2s ease; /* AnimaciÛn suave al pasar el mouse */
            text-decoration: none;
        }

        /* --- Colores de los botones --- */
        
        .btn-jugar {
            background-color: #2ecc71; /* Un color verde claro y amigable */
        }

        .btn-promo {
            background-color: #3498db; /* Un color azul claro */
        }

        /* --- Efectos al pasar el mouse (Hover) --- */
        .btn:hover {
            transform: translateY(-2px); /* PequeÒa elevaciÛn */
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4); /* Sombra m·s fuerte */
        }
        
        .btn-jugar:hover {
            background-color: #27ae60; /* Verde m·s oscuro al hover */
        }

        .btn-promo:hover {
            background-color: #2980b9; /* Azul m·s oscuro al hover */
        }

    </style>
</head>
<body>

    <div class="menu-container">
        <button class="btn btn-jugar" onclick="location.href='#juego'">°A Jugar!</button>
        
        <button class="btn btn-promo" onclick="location.href='#promos'">Promociones</button>
    </div>

</body>
</html>
