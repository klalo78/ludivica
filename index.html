<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web App</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Configuración del fondo de pantalla completa */
        body {
            background-image: url('back.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif; /* Tipografía más amigable y lúdica */
        }

        /* Contenedor de los botones */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 25px; /* Espacio intermedio entre botones */
            width: 90%;
            max-width: 320px; /* Controla el ancho máximo en pantallas grandes */
            text-align: center;
        }

        /* Estilo base de los botones rectangulares redondeados */
        .btn {
            display: block;
            width: 100%;
            padding: 18px 20px;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.4); /* Borde sutil que le da definición */
            border-radius: 16px; /* Ajusta este valor si los querés más o menos redondeados */
            cursor: pointer;
            letter-spacing: 1px;
            
            /* Sombra exterior para dar profundidad y sombra interior (inset) para el efecto 3D */
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3), 
                        inset 0 -4px 0px rgba(0, 0, 0, 0.2),
                        inset 0 4px 0px rgba(255, 255, 255, 0.3);
            
            transition: all 0.2s ease;
            text-shadow: 1px 2px 3px rgba(0, 0, 0, 0.3);
        }

        /* Botón Jugar: Degradado Naranja/Rojo */
        .btn-jugar {
            background: linear-gradient(135deg, #ff512f, #dd2476);
        }

        /* Botón Promociones: Degradado Azul/Celeste */
        .btn-promo {
            background: linear-gradient(135deg, #06beb6, #48b1bf);
        }

        /* --- EFECTOS AL INTERACTUAR --- */

        /* Al pasar el mouse (Hover) */
        .btn:hover {
            transform: translateY(-3px); /* Se eleva ligeramente */
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4), 
                        inset 0 -4px 0px rgba(0, 0, 0, 0.2),
                        inset 0 4px 0px rgba(255, 255, 255, 0.4);
        }

        /* Al hacer clic o tocar la pantalla (Active) */
        .btn:active {
            transform: translateY(2px); /* Se hunde como un botón real */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), 
                        inset 0 -2px 0px rgba(0, 0, 0, 0.2),
                        inset 0 2px 0px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button class="btn btn-jugar" onclick="location.href='#juego'">
            ˇA Jugar!!
        </button>
        
        <button class="btn btn-promo" onclick="location.href='#promos'">
            Promociones
        </button>
    </div>

</body>
</html>
